<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة المكاتب الرقمية — نموذج تفاعلي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1F3864; --blue:#2E75B6; --blue-soft:#DDEBF7; --bg:#f4f6fb; --card:#ffffff;
  --text:#1f2733; --muted:#6b7686; --line:#e6eaf1; --green:#1f9d57; --amber:#e0a200;
  --red:#d8453c; --purple:#6c4bd1; --shadow:0 2px 14px rgba(20,40,80,.08);
  --radius:14px; --font:'Tajawal',system-ui,'Segoe UI',Tahoma,Arial,sans-serif;
}
html[lang="en"]{ --font:'Inter',system-ui,'Segoe UI',Arial,sans-serif; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.55}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
.hidden{display:none!important}

/* Top bar */
.topbar{height:60px;background:var(--navy);color:#fff;display:flex;align-items:center;
  gap:14px;padding:0 18px;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#4f9be6,#2E75B6);
  display:grid;place-items:center;font-size:18px}
.spacer{flex:1}
.topbtn{color:#dce6f5;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:9px;font-size:14px}
.topbtn:hover{background:rgba(255,255,255,.12);color:#fff}
.rolepick{background:rgba(255,255,255,.12);color:#fff;border-radius:9px;padding:7px 10px;border:1px solid rgba(255,255,255,.18)}
.rolepick option{color:#1f2733}
.bell{position:relative}
.bell .dot{position:absolute;top:2px;inset-inline-end:4px;background:var(--red);color:#fff;font-size:10px;
  min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;padding:0 3px}
.langbtn{border:1px solid rgba(255,255,255,.3);border-radius:9px;padding:6px 12px;color:#fff;font-weight:700}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:236px;background:var(--card);border-inline-end:1px solid var(--line);padding:16px 12px;
  flex-shrink:0}
.side-title{font-size:12px;color:var(--muted);font-weight:700;margin:14px 8px 6px;letter-spacing:.3px}
.navitem{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;color:var(--text);
  font-weight:500;width:100%;text-align:start;margin-bottom:2px}
.navitem .ic{font-size:18px;width:22px;text-align:center}
.navitem:hover{background:var(--bg)}
.navitem.active{background:var(--blue);color:#fff}
.navitem .badge{margin-inline-start:auto;background:var(--blue-soft);color:var(--navy);font-size:11px;
  padding:1px 8px;border-radius:9px;font-weight:700}
.navitem.active .badge{background:rgba(255,255,255,.25);color:#fff}
.content{flex:1;padding:26px 30px;overflow:auto}

/* Context bar */
.ctxbar{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.ctxbar h1{font-size:23px;font-weight:700}
.ctxbar .sub{color:var(--muted);font-size:14px}
.officechip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
  border-radius:30px;padding:5px 6px 5px 14px;box-shadow:var(--shadow)}
.officechip .oav{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}

/* Cards */
.grid{display:grid;gap:16px}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1050px){.cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr 1fr}}
@media(max-width:720px){.cols-4,.cols-3,.cols-2{grid-template-columns:1fr}.sidebar{display:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.stat .lbl{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.stat .val{font-size:30px;font-weight:700;color:var(--navy)}
.stat .chg{font-size:12px;color:var(--green);font-weight:700;margin-top:4px}
.stat .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px}

.section-h{display:flex;align-items:center;gap:10px;margin:6px 0 14px}
.section-h h2{font-size:18px;font-weight:700}
.section-h .sp{flex:1}

/* Buttons */
.btn{background:var(--blue);color:#fff;padding:10px 16px;border-radius:10px;font-weight:700;font-size:14px;
  display:inline-flex;align-items:center;gap:8px}
.btn:hover{background:#256099}
.btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--bg)}
.btn.sm{padding:7px 12px;font-size:13px}
.btn.green{background:var(--green)}.btn.green:hover{filter:brightness(.94)}

/* Table */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:12px 12px;text-align:start;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-size:12.5px;font-weight:700;background:#fafbfe}
tr:hover td{background:#fafcff}
.tag{font-size:12px;font-weight:700;padding:3px 11px;border-radius:20px;display:inline-block}
.t-new{background:#e9f1ff;color:#2b62c9}.t-prog{background:#fff3d6;color:#9a7400}
.t-done{background:#e2f6ea;color:#157f43}.t-trans{background:#efe9ff;color:#5a3ec2}
.t-on{background:#e2f6ea;color:#157f43}.t-off{background:#fdeceb;color:#bb2f27}

/* Office cards */
.office-card{cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.office-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(20,40,80,.13)}
.office-card .top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.office-card .oav{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:19px}
.office-card .mini{display:flex;gap:18px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.office-card .mini div{font-size:13px;color:var(--muted)}
.office-card .mini b{display:block;color:var(--navy);font-size:17px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(15,25,45,.5);display:grid;place-items:center;z-index:100;padding:20px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:19px;margin-bottom:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--muted)}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fbfcfe}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.swatches{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:30px;height:30px;border-radius:8px;cursor:pointer;border:3px solid transparent}
.swatch.sel{border-color:var(--navy)}

/* Public page */
.pub-hero{background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:18px;padding:36px;color:#fff;
  display:flex;align-items:center;gap:22px;margin-bottom:20px;position:relative}
.pub-hero .oav{width:84px;height:84px;border-radius:22px;display:grid;place-items:center;font-size:34px;font-weight:700;background:rgba(255,255,255,.2)}
.pub-hero h1{font-size:28px}
.urlbar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:10px 14px;margin-bottom:20px;box-shadow:var(--shadow)}
.urlbar code{flex:1;color:var(--blue);font-weight:600;direction:ltr;text-align:start;font-size:14px}

/* Chat */
.chat-wrap{display:grid;grid-template-columns:240px 1fr;gap:0;height:540px;background:#fff;border:1px solid var(--line);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.chat-list{border-inline-end:1px solid var(--line);overflow:auto}
.chat-conv{padding:13px 15px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:10px;align-items:center}
.chat-conv:hover,.chat-conv.active{background:var(--blue-soft)}
.chat-conv .oav{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;flex-shrink:0}
.chat-conv .nm{font-weight:700;font-size:14px}
.chat-conv .lm{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.chat-main{display:flex;flex-direction:column}
.chat-head{padding:14px 18px;border-bottom:1px solid var(--line);font-weight:700;display:flex;align-items:center;gap:10px}
.chat-body{flex:1;overflow:auto;padding:18px;background:#f7f9fc;display:flex;flex-direction:column;gap:10px}
.msg{max-width:70%;padding:10px 14px;border-radius:14px;font-size:14px}
.msg.them{background:#fff;border:1px solid var(--line);align-self:flex-start;border-start-start-radius:4px}
.msg.me{background:var(--blue);color:#fff;align-self:flex-end;border-start-end-radius:4px}
.msg .tm{font-size:10px;opacity:.6;margin-top:3px}
.chat-input{display:flex;gap:10px;padding:14px;border-top:1px solid var(--line)}
.chat-input input{flex:1;padding:11px 14px;border:1px solid var(--line);border-radius:24px;background:#fbfcfe}

/* Notifications */
.notif{display:flex;gap:13px;padding:14px;border-bottom:1px solid var(--line);align-items:flex-start}
.notif:last-child{border-bottom:none}
.notif .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.notif .tm{color:var(--muted);font-size:12px;margin-top:3px}
.notif.unread{background:#f3f8ff}

/* permission grid */
.perm-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.perm-row:last-child{border:none}
.perm-row .nm{flex:1;font-weight:600}
.switch{width:42px;height:24px;background:#ccd4e0;border-radius:20px;position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.switch.on{background:var(--green)}
.switch::after{content:"";position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;inset-inline-start:3px;transition:.2s}
.switch.on::after{inset-inline-start:21px}
html[dir="rtl"] .switch.on::after{inset-inline-start:auto;inset-inline-end:3px}

/* bars */
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.bar-row .nm{width:120px;font-size:14px;font-weight:600}
.bar-track{flex:1;height:12px;background:var(--bg);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#4f9be6,var(--blue))}
.bar-row .vv{width:40px;text-align:end;font-weight:700;color:var(--navy)}

.banner{background:linear-gradient(120deg,#eaf2fd,#f4f8ff);border:1px solid var(--blue-soft);border-radius:14px;
  padding:14px 18px;display:flex;gap:12px;align-items:center;margin-bottom:18px;font-size:13.5px;color:var(--navy)}
.banner .ic{font-size:22px}
.toast{position:fixed;bottom:24px;inset-inline-end:24px;background:var(--navy);color:#fff;padding:13px 20px;
  border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:200;font-weight:600;animation:slideup .3s}
@keyframes slideup{from{transform:translateY(20px);opacity:0}}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ic{font-size:46px;opacity:.4;margin-bottom:10px}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="logo">🏢</span><span data-i18n="appName">منصة المكاتب الرقمية</span></div>
  <div class="spacer"></div>
  <select class="rolepick" id="rolePick" onchange="switchRole(this.value)">
    <option value="admin" data-i18n="roleAdmin">الإدارة العامة</option>
    <option value="manager" data-i18n="roleManager">مدير مكتب</option>
    <option value="employee" data-i18n="roleEmployee">موظفة</option>
  </select>
  <button class="topbtn bell" onclick="go('notifications')">🔔<span class="dot" id="bellDot">3</span></button>
  <button class="langbtn" onclick="toggleLang()" id="langBtn">EN</button>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content"></main>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

function statusBars(reqs){
  const map={new:"stNew",prog:"stProg",done:"stDone",trans:"stTrans"};
  const tot=Math.max(reqs.length,1);
  return Object.keys(map).map(k=>{const c=reqs.filter(r=>r.status===k).length;const pct=Math.round(c/tot*100);
    return `<div class="bar-row"><div class="nm">${t(map[k])}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="vv">${c}</div></div>`;}).join("");
}
function miniReqs(o){
  if(!o.requests.length) return `<div class="empty"><div class="ic">📋</div>${t("noTransfers")}</div>`;
  return `<table><tbody>`+o.requests.slice(0,4).map(r=>`<tr><td style="font-weight:700;direction:ltr">${r.id}</td><td>${LANG==="ar"?r.title_ar:r.title_en}</td><td>${statusTag(r.status)}</td></tr>`).join("")+`</tbody></table>`;

  if(!state.transfersLog.length){h+=`<div class="empty"><div class="ic">🔄</div>${t("noTransfers")}</div>`;}
  else{h+=`<table><thead><tr><th>${t("reqId")}</th><th>${t("fromOffice")}</th><th></th><th>${t("toOffice")}</th><th>${LANG==="ar"?"الوقت":"Time"}</th></tr></thead><tbody>`;
    h+=state.transfersLog.map(x=>`<tr><td style="font-weight:700;direction:ltr">${x.req}</td><td>${LANG==="ar"?x.from_ar:x.from_en}</td><td style="color:var(--blue)">→</td><td>${LANG==="ar"?x.to_ar:x.to_en}</td><td style="color:var(--muted)">${LANG==="ar"?x.tm_ar:x.tm_en}</td></tr>`).join("");
    h+=`</tbody></table>`;}
  h+=`</div>`;
  return h;
}

function vNotifications(){
  let h=`<div class="ctxbar"><h1>${t("notifications")}</h1><div class="sp" style="flex:1"></div><button class="btn ghost" onclick="markAllRead()">${t("markRead")}</button></div>`;
  h+=`<div class="card" style="padding:0;overflow:hidden">`;
  h+=state.notifs.map(n=>`<div class="notif ${n.unread?"unread":""}"><span class="ic" style="background:${n.col};color:${n.cl}">${n.ic}</span>
    <div style="flex:1"><div>${LANG==="ar"?n.ar:n.en}</div><div class="tm">${LANG==="ar"?n.tm_ar:n.tm_en}</div></div>
    ${n.unread?'<span style="width:9px;height:9px;border-radius:50%;background:var(--red);margin-top:6px"></span>':""}</div>`).join("");
  h+=`</div>`;
  return h;
}
function markAllRead(){state.notifs.forEach(n=>n.unread=false);render();}

function vGlobalStats(){
  let h=`<div class="ctxbar"><h1>${t("globalStats")}</h1><span class="sub">— ${t("roleAdmin")}</span></div>`;
  const top=[{lbl:"satisfaction",val:"94%",ic:"⭐",bg:"#fff3d6",cl:"#9a7400"},{lbl:"completion",val:Math.round(allReqs().filter(r=>r.status==="done").length/Math.max(allReqs().length,1)*100)+"%",ic:"✅",bg:"#e2f6ea",cl:"#157f43"},{lbl:"avgTime",val:"2.4 "+t("days"),ic:"⏱️",bg:"#e9f1ff",cl:"#2b62c9"}];
  h+=`<div class="grid cols-3">`+top.map(c=>`<div class="card stat"><div class="lbl"><span class="ic" style="background:${c.bg};color:${c.cl}">${c.ic}</span>${t(c.lbl)}</div><div class="val">${c.val}</div></div>`).join("")+`</div>`;
  h+=`<div class="grid cols-2" style="margin-top:18px"><div class="card"><div class="section-h"><h2>${t("reqByOffice")}</h2></div>`;
  const max=Math.max(...state.offices.map(o=>o.requests.length),1);
  h+=state.offices.map(o=>`<div class="bar-row"><div class="nm">${oName(o)}</div><div class="bar-track"><div class="bar-fill" style="width:${o.requests.length/max*100}%;background:linear-gradient(90deg,${o.color},${shade(o.color)})"></div></div><div class="vv">${o.requests.length}</div></div>`).join("");
  h+=`</div><div class="card"><div class="section-h"><h2>${t("monthlyReq")}</h2></div>${sparkBars([8,12,9,15,18,14])}</div></div>`;
  return h;
}
function vStatistics(){
  const o=off(state.activeOfficeId);
  let h=`<div class="ctxbar"><h1>${t("statistics")}</h1>${officeSwitcher()}</div>`;
  const top=[{lbl:"reqs",val:o.requests.length,ic:"📋",bg:"#e9f1ff",cl:"#2b62c9"},{lbl:"completion",val:Math.round(o.requests.filter(r=>r.status==="done").length/Math.max(o.requests.length,1)*100)+"%",ic:"✅",bg:"#e2f6ea",cl:"#157f43"},{lbl:"avgTime",val:"2.1 "+t("days"),ic:"⏱️",bg:"#fff3d6",cl:"#9a7400"},{lbl:"satisfaction",val:"96%",ic:"⭐",bg:"#efe9ff",cl:"#5a3ec2"}];
  h+=`<div class="grid cols-4">`+top.map(c=>`<div class="card stat"><div class="lbl"><span class="ic" style="background:${c.bg};color:${c.cl}">${c.ic}</span>${t(c.lbl)}</div><div class="val">${c.val}</div></div>`).join("")+`</div>`;
  h+=`<div class="grid cols-2" style="margin-top:18px"><div class="card"><div class="section-h"><h2>${t("reqByStatus")}</h2></div>${statusBars(o.requests)}</div>`;
  h+=`<div class="card"><div class="section-h"><h2>${t("monthlyReq")}</h2></div>${sparkBars([3,5,4,6,5,7])}</div></div>`;
  return h;
}
function sparkBars(data){const max=Math.max(...data);const lbl=LANG==="ar"?["ينا","فبر","مار","أبر","ماي","يون"]:["Jan","Feb","Mar","Apr","May","Jun"];
  return `<div style="display:flex;align-items:flex-end;gap:14px;height:160px;padding-top:10px">`+data.map((d,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end"><div style="font-size:12px;font-weight:700;color:var(--navy)">${d}</div><div style="width:100%;height:${d/max*100}%;background:linear-gradient(180deg,#4f9be6,#2E75B6);border-radius:7px 7px 0 0"></div><div style="font-size:11px;color:var(--muted)">${lbl[i]}</div></div>`).join("")+`</div>`;
}

/* ============ MODALS ============ */
function modal(html){document.getElementById("modalRoot").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById("modalRoot").innerHTML="";}

let tmpColor=COLORS[0];
function openOfficeModal(){
  tmpColor=COLORS[0];
  modal(`<h3>＋ ${t("newOffice")}</h3>
  <div class="field"><label>${t("officeName")}</label><input id="m_name" placeholder="${LANG==="ar"?"مثال: مكتب التصميم":"e.g. Design Office"}"></div>
  <div class="field"><label>${t("category")}</label><input id="m_cat" placeholder="${LANG==="ar"?"تصميم":"Design"}"></div>
  <div class="field"><label>${t("description")}</label><textarea id="m_desc" rows="2"></textarea></div>
  <div class="field"><label>${t("color")}</label><div class="swatches" id="m_sw">${COLORS.map((c,i)=>`<div class="swatch ${i===0?"sel":""}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join("")}</div></div>
  <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button><button class="btn" onclick="createOffice()">${t("create")}</button></div>`);
}
function pickColor(c,el){tmpColor=c;document.querySelectorAll("#m_sw .swatch").forEach(s=>s.classList.remove("sel"));el.classList.add("sel");}
function createOffice(){
  const nm=document.getElementById("m_name").value.trim()||(LANG==="ar"?"مكتب جديد":"New Office");
  const cat=document.getElementById("m_cat").value.trim()||(LANG==="ar"?"عام":"General");
  const desc=document.getElementById("m_desc").value.trim()||(LANG==="ar"?"وصف المكتب.":"Office description.");
  const id=Math.max(...state.offices.map(o=>o.id))+1;
  const slug=(nm.replace(/[^\w؀-ۿ]+/g,"-").toLowerCase()).slice(0,24)||("office-"+id);
  state.offices.push({id,name_ar:nm,name_en:nm,slug,color:tmpColor,cat_ar:cat,cat_en:cat,desc_ar:desc,desc_en:desc,staff:[],requests:[]});
  closeModal();render();toast(t("created"));
}
function openStaffModal(){
  modal(`<h3>＋ ${t("addStaff")}</h3>
  <div class="field"><label>${t("name")}</label><input id="s_name" placeholder="${LANG==="ar"?"اسم الموظفة":"Staff name"}"></div>
  <div class="field"><label>${t("role")}</label><select id="s_role"><option value="manager">${t("manager")}</option><option value="agent" selected>${t("agent")}</option><option value="viewer">${t("viewer")}</option></select></div>
  <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button><button class="btn" onclick="addStaff()">${t("add")}</button></div>`);
}
function addStaff(){
  const nm=document.getElementById("s_name").value.trim()||(LANG==="ar"?"موظفة جديدة":"New Staff");
  const role=document.getElementById("s_role").value;
  off(state.activeOfficeId).staff.push({n_ar:nm,n_en:nm,role,active:true});
  closeModal();render();toast(t("added"));
}
function openReqModal(){
  modal(`<h3>＋ ${t("newReq")}</h3>
  <div class="field"><label>${t("reqTitle")}</label><input id="r_title"></div>
  <div class="field"><label>${t("client")}</label><input id="r_client"></div>
  <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button><button class="btn" onclick="addReq()">${t("create")}</button></div>`);
}
function addReq(){
  const o=off(state.activeOfficeId);
  const title=document.getElementById("r_title").value.trim()||(LANG==="ar"?"طلب جديد":"New request");
  const client=document.getElementById("r_client").value.trim()||"—";
  const id="R-"+(1000+Math.floor(Math.random()*9000));
  o.requests.unshift({id,title_ar:title,title_en:title,client,assignee_ar:o.staff[0]?o.staff[0].n_ar:"—",assignee_en:o.staff[0]?o.staff[0].n_en:"—",status:"new"});
  closeModal();render();toast(t("added"));
}
function openTransferModal(reqId){
  const cur=off(state.activeOfficeId);
  const reqOpts=cur.requests.map(r=>`<option value="${r.id}" ${r.id===reqId?"selected":""}>${r.id} — ${LANG==="ar"?r.title_ar:r.title_en}</option>`).join("");
  const toOpts=state.offices.filter(o=>o.id!==cur.id).map(o=>`<option value="${o.id}">${oName(o)}</option>`).join("");
  modal(`<h3>🔄 ${t("transferReq")}</h3>
  <div class="field"><label>${t("fromOffice")}</label><input value="${oName(cur)}" disabled></div>
  <div class="field"><label>${t("reqToTransfer")}</label><select id="tr_req">${reqOpts}</select></div>
  <div class="field"><label>${t("toOffice")}</label><select id="tr_to">${toOpts}</select></div>
  <div class="field"><label>${t("note")}</label><textarea id="tr_note" rows="2"></textarea></div>
  <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button><button class="btn" onclick="doTransfer()">${t("transfer")}</button></div>`);
}
function doTransfer(){
  const cur=off(state.activeOfficeId);
  const reqId=document.getElementById("tr_req").value;
  const toId=+document.getElementById("tr_to").value;
  const to=off(toId);
  const r=cur.requests.find(x=>x.id===reqId);
  if(r){r.status="trans";
    to.requests.unshift({...r,status:"new",assignee_ar:to.staff[0]?to.staff[0].n_ar:"—",assignee_en:to.staff[0]?to.staff[0].n_en:"—"});
    const tm=LANG==="ar"?"الآن":"Now";
    state.transfersLog.unshift({from_ar:cur.name_ar,from_en:cur.name_en,to_ar:to.name_ar,to_en:to.name_en,req:reqId,tm_ar:tm,tm_en:tm});
    state.notifs.unshift({ic:"🔄",col:"#efe9ff",cl:"#5a3ec2",ar:`تم تحويل ${reqId} إلى ${to.name_ar}`,en:`${reqId} transferred to ${to.name_en}`,tm_ar:"الآن",tm_en:"Now",unread:true});
  }
  closeModal();render();toast(t("transferred"));
}

/* ============ render ============ */
function render(){
  renderSidebar();
  document.getElementById("bellDot").textContent=state.notifs.filter(n=>n.unread).length;
  document.getElementById("bellDot").style.display=state.notifs.filter(n=>n.unread).length?"grid":"none";
  const v=state.currentView;let html="";
  if(state.role==="admin"){
    if(v==="dashboard")html=vAdminDashboard();
    else if(v==="offices")html=vOffices();
    else if(v==="globalStats")html=vGlobalStats();
    else if(v==="collab")html=vCollab();
    else if(v==="notifications")html=vNotifications();
    else html=vAdminDashboard();
  } else {
    if(v==="dashboard")html=vManagerDashboard();
    else if(v==="publicPage")html=vPublicPage();
    else if(v==="employees"&&state.role==="manager")html=vEmployees();
    else if(v==="requests")html=vRequests();
    else if(v==="chat")html=vChat();
    else if(v==="collab")html=vCollab();
    else if(v==="statistics")html=vStatistics();
    else if(v==="notifications")html=vNotifications();
    else html=vManagerDashboard();
  }
  document.getElementById("content").innerHTML=html;
}
document.querySelectorAll("[data-i18n]").forEach(e=>e.textContent=t(e.dataset.i18n));
render();
</script>
</body>
</html>
